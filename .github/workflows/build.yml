name: Build DarkWave

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-portaudio
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-opusfile
            mingw-w64-ucrt-x86_64-rnnoise
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-mesa

      - name: Build Windows
        shell: msys2 {0}
        run: |
          export GOROOT=/ucrt64/lib/go
          export PATH="/ucrt64/lib/go/bin:$PATH"
          go build -ldflags="-H windowsgui" -o DarkWave.exe ./cmd/app/
          mkdir DarkWave-windows
          mv DarkWave.exe DarkWave-windows/
          # Core audio/codec DLLs
          for dll in libportaudio.dll libopus-0.dll libopusfile-0.dll librnnoise-0.dll \
                     libogg-0.dll libffi-8.dll libiconv-2.dll libintl-8.dll \
                     libsystre-0.dll libtre-5.dll libxml2-16.dll libzstd.dll zlib1.dll \
                     libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            cp /ucrt64/bin/$dll DarkWave-windows/ || true
          done
          # Mesa fallback DLLs (separate folder, for old PCs/VMs without proper GPU drivers)
          mkdir DarkWave-windows-mesa-fallback
          for dll in opengl32.dll libgallium_wgl.dll libLLVM-21.dll libSPIRV-Tools.dll; do
            cp /ucrt64/bin/$dll DarkWave-windows-mesa-fallback/ || true
          done

      - name: Zip Windows builds
        shell: pwsh
        run: |
          Compress-Archive -Path DarkWave-windows -DestinationPath DarkWave-windows.zip
          Compress-Archive -Path DarkWave-windows-mesa-fallback -DestinationPath DarkWave-windows-mesa-fallback.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-windows
          path: DarkWave-windows.zip

      - name: Upload Windows Mesa fallback artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-windows-mesa-fallback
          path: DarkWave-windows-mesa-fallback.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DarkWave-windows.zip
            DarkWave-windows-mesa-fallback.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc pkg-config autoconf automake libtool \
            libportaudio2 portaudio19-dev \
            libopus-dev libopusfile-dev \
            libgl1-mesa-dev \
            xorg-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - name: Build and install rnnoise from source
        run: |
          git clone https://gitlab.xiph.org/xiph/rnnoise.git
          cd rnnoise
          ./autogen.sh
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build Linux
        run: CGO_ENABLED=1 go build -o DarkWave-linux ./cmd/app/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-linux
          path: DarkWave-linux

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: DarkWave-linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          brew install portaudio opus opusfile pkg-config autoconf automake libtool

      - name: Build and install rnnoise from source
        run: |
          git clone https://gitlab.xiph.org/xiph/rnnoise.git
          cd rnnoise
          ./autogen.sh
          ./configure --prefix=$(brew --prefix)
          make
          sudo make install

      - name: Build Mac
        env:
          # macos-latest is Apple Silicon; Homebrew lives at /opt/homebrew
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          CGO_CFLAGS: -I/opt/homebrew/include
          CGO_LDFLAGS: -L/opt/homebrew/lib
          CGO_ENABLED: 1
        run: go build -o DarkWave-mac ./cmd/app/

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-mac
          path: DarkWave-mac

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: DarkWave-mac
