name: Build DarkWave

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-portaudio
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-opusfile
            mingw-w64-ucrt-x86_64-rnnoise
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Build Windows
  shell: msys2 {0}
  run: |
    export PATH="/ucrt64/lib/go/bin:$PATH"
    export GOROOT=/ucrt64/lib/go
    go build -o DarkWave-windows.exe ./cmd/app/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-windows
          path: DarkWave-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
  run: |
    sudo apt-get update
    sudo apt-get install -y \
      gcc \
      libportaudio2 \
      portaudio19-dev \
      libopus-dev \
      libopusfile-dev \
      pkg-config \
      libgl1-mesa-dev \
      xorg-dev \
      cmake
    # build rnnoise from source
    git clone https://github.com/xiph/rnnoise.git
    cd rnnoise
    mkdir build && cd build
    cmake ..
    make
    sudo make install
    sudo ldconfig

      - name: Build Linux
        run: |
          go build -o DarkWave-linux ./cmd/app/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-linux
          path: DarkWave-linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
  run: |
    brew install portaudio opus opusfile pkg-config
    brew install rnnoise || true
    # if rnnoise not in brew, build from source
    if ! pkg-config --exists rnnoise; then
      git clone https://github.com/xiph/rnnoise.git
      cd rnnoise && mkdir build && cd build
      cmake .. && make && sudo make install
    fi

      - name: Build Mac
        run: |
          go build -o DarkWave-mac ./cmd/app/

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-mac
          path: DarkWave-mac