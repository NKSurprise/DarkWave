name: Build DarkWave

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-portaudio
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-opusfile
            mingw-w64-ucrt-x86_64-rnnoise
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Build Windows
        shell: msys2 {0}
        run: |
          export GOROOT=/ucrt64/lib/go
          export PATH="/ucrt64/lib/go/bin:$PATH"
          go build -o DarkWave.exe ./cmd/app/
          mkdir DarkWave-windows
          mv DarkWave.exe DarkWave-windows/
          cp /ucrt64/bin/libportaudio.dll DarkWave-windows/
          cp /ucrt64/bin/libopus-0.dll DarkWave-windows/
          cp /ucrt64/bin/libopusfile-0.dll DarkWave-windows/
          cp /ucrt64/bin/librnnoise-0.dll DarkWave-windows/
          cp /ucrt64/bin/libgcc_s_seh-1.dll DarkWave-windows/ || true
          cp /ucrt64/bin/libstdc++-6.dll DarkWave-windows/ || true
          cp /ucrt64/bin/libwinpthread-1.dll DarkWave-windows/ || true

      - name: Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path DarkWave-windows -DestinationPath DarkWave-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-windows
          path: DarkWave-windows.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: DarkWave-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libportaudio2 portaudio19-dev libopus-dev libopusfile-dev pkg-config libgl1-mesa-dev xorg-dev cmake autoconf automake libtool

      - name: Build rnnoise
        run: |
          git clone https://github.com/xiph/rnnoise.git
          cd rnnoise && ./autogen.sh && ./configure && make && sudo make install && sudo ldconfig

      - name: Build Linux
        run: |
          go build -o DarkWave-linux ./cmd/app/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-linux
          path: DarkWave-linux

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: DarkWave-linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          brew install portaudio opus opusfile pkg-config cmake autoconf automake libtool

      - name: Build rnnoise
        run: |
          git clone https://github.com/xiph/rnnoise.git
          cd rnnoise && ./autogen.sh && ./configure && make && sudo make install

      - name: Build Mac
        run: |
          go build -o DarkWave-mac ./cmd/app/

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWave-mac
          path: DarkWave-mac

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: DarkWave-mac